<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgroMonitor — Trampas</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a4d1a, #2d7d2d);
      color: white;
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    header p {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 3px;
    }

    #estado-conexion {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .online  { background: #d4edda; color: #155724; }
    .offline-bar { background: #fff3cd; color: #856404; }

    .form-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: #1a4d1a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8f5e8;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 5px;
      margin-top: 12px;
    }

    label:first-of-type { margin-top: 0; }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      color: #333;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #2d7d2d;
      background: white;
    }

    .conteo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .conteo-item label {
      font-size: 12px;
      color: #666;
    }

    .especie-header {
      font-size: 13px;
      font-weight: 700;
      color: #555;
      margin: 12px 0 8px 0;
      padding: 6px 10px;
      background: #f0f4f0;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-guardar {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #1a4d1a, #2d7d2d);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(45,125,45,0.3);
      transition: transform 0.1s;
    }

    .btn-guardar:active { transform: scale(0.98); }

    #mensaje {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }

    .exito  { background: #d4edda; color: #155724; }
    .error  { background: #f8d7da; color: #721c24; }
    .offline { background: #fff3cd; color: #856404; }

    #lista-pendientes {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: none;
    }

    #lista-pendientes h3 {
      font-size: 13px;
      font-weight: 700;
      color: #856404;
      margin-bottom: 10px;
    }

    .pendiente-item {
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      color: #555;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-sync {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: #856404;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .gps-badge {
      font-size: 11px;
      color: #2d7d2d;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>🪤 AgroMonitor</h1>
  <p>Fundo Muto — Monitoreo de Moscas y Plagas</p>
</header>

<div id="estado-conexion">Verificando conexión...</div>

<div class="form-container">

  <div class="card">
    <div class="card-title">📋 Información General</div>

    <label>Fecha</label>
    <input type="date" id="fecha">

    <label>Lugar</label>
    <select id="lugar">
      <option value="">— Seleccionar lugar —</option>
      <option value="F.AGROPEL">F.AGROPEL</option>
      <option value="F.ZEGARRA">F.ZEGARRA</option>
      <option value="F.SANTA GABRIELA">F.SANTA GABRIELA</option>
      <option value="SALAS">SALAS</option>
      <option value="FAA 1-4">FAA 1-4</option>
      <option value="HUERTO CASA">HUERTO CASA</option>
      <option value="UCHAS">UCHAS</option>
      <option value="FAA 5-6">FAA 5-6</option>
      <option value="FAA PERIMETROS">FAA PERIMETROS</option>
    </select>

    <label>Lote (referencia)</label>
    <input type="text" id="lote" placeholder="Ej. Lote A, Sector 2...">

    <label>Tipo de Trampa</label>
    <select id="tipo_trampa">
      <option value="">— Seleccionar tipo —</option>
      <option value="L.TORULA">L.TORULA</option>
      <option value="JACKSON">JACKSON</option>
      <option value="MIXTAS">MIXTAS</option>
      <option value="GF-120">GF-120</option>
    </select>

    <div class="gps-badge" id="gps-status">📍 Obteniendo ubicación...</div>
  </div>

  <div class="card">
    <div class="card-title">🦟 Conteo de Individuos</div>

    <div class="especie-header">🔴 Ceratitis capitata</div>
    <div class="conteo-grid">
      <div class="conteo-item">
        <label>♂ Machos</label>
        <input type="number" id="machos_ceratitis" min="0" value="0">
      </div>
      <div class="conteo-item">
        <label>♀ Hembras</label>
        <input type="number" id="hembras_ceratitis" min="0" value="0">
      </div>
    </div>

    <div class="especie-header">🟠 Anastrepha spp.</div>
    <div class="conteo-grid">
      <div class="conteo-item">
        <label>♂ Machos</label>
        <input type="number" id="machos_anastrepha" min="0" value="0">
      </div>
      <div class="conteo-item">
        <label>♀ Hembras</label>
        <input type="number" id="hembras_anastrepha" min="0" value="0">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📝 Observaciones</div>
    <textarea id="observacion" rows="3" placeholder="Notas adicionales, condiciones del campo..."></textarea>
  </div>

  <button class="btn-guardar" onclick="guardarRegistro()">💾 Guardar Registro</button>

  <div id="mensaje"></div>

  <div id="lista-pendientes">
    <h3>⏳ Registros pendientes de sincronizar</h3>
    <div id="items-pendientes"></div>
    <button class="btn-sync" onclick="sincronizarPendientes()">🔄 Sincronizar ahora</button>
  </div>

</div>

<script>
  const API = "";

  // GPS
  let lat = null, lon = null;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      document.getElementById('gps-status').textContent = `📍 Ubicación capturada (${lat.toFixed(5)}, ${lon.toFixed(5)})`;
    }, () => {
      document.getElementById('gps-status').textContent = '📍 Ubicación no disponible';
    });
  }

  // Fecha de hoy por defecto
  document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

  // Estado de conexión
  function actualizarEstado() {
    const div = document.getElementById('estado-conexion');
    if (navigator.onLine) {
      div.textContent = '🟢 Conectado a internet';
      div.className = 'online';
      sincronizarPendientes();
    } else {
      div.textContent = '🟡 Sin internet — guardando localmente';
      div.className = 'offline-bar';
    }
    mostrarPendientes();
  }

  window.addEventListener('online', actualizarEstado);
  window.addEventListener('offline', actualizarEstado);
  actualizarEstado();

  // IndexedDB
  function abrirDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('campo-app-db', 1);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore('pendientes', { keyPath: 'id', autoIncrement: true });
      };
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = reject;
    });
  }

  async function guardarPendiente(datos) {
    const db = await abrirDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('pendientes', 'readwrite');
      tx.objectStore('pendientes').add({ datos, timestamp: new Date().toISOString() });
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  }

  async function obtenerPendientes() {
    const db = await abrirDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('pendientes', 'readonly');
      const req = tx.objectStore('pendientes').getAll();
      req.onsuccess = e => resolve(e.target.result);
      req.onerror = reject;
    });
  }

  async function eliminarPendiente(id) {
    const db = await abrirDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction('pendientes', 'readwrite');
      tx.objectStore('pendientes').delete(id);
      tx.oncomplete = resolve;
      tx.onerror = reject;
    });
  }

  async function mostrarPendientes() {
    const pendientes = await obtenerPendientes();
    const div = document.getElementById('lista-pendientes');
    const items = document.getElementById('items-pendientes');
    if (pendientes.length === 0) {
      div.style.display = 'none';
      return;
    }
    div.style.display = 'block';
    items.innerHTML = pendientes.map(p =>
      `<div class="pendiente-item">⏳ ${p.datos.lugar} — ${p.datos.tipo_trampa} — ${p.timestamp.slice(0,16).replace('T',' ')}</div>`
    ).join('');
  }

  async function sincronizarPendientes() {
    const pendientes = await obtenerPendientes();
    if (pendientes.length === 0) return;

    let sincronizados = 0;
    for (const registro of pendientes) {
      try {
        const res = await fetch(`${API}/registro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(registro.datos)
        });
        if (res.ok) {
          await eliminarPendiente(registro.id);
          sincronizados++;
        }
      } catch (e) {
        console.log('Sin internet aún:', e);
      }
    }
    if (sincronizados > 0) {
      mostrarMensaje(`✅ ${sincronizados} registro(s) sincronizados con el servidor`, 'exito');
    }
    mostrarPendientes();
  }

  async function guardarRegistro() {
    const fecha = document.getElementById('fecha').value;
    const lugar = document.getElementById('lugar').value;
    const lote = document.getElementById('lote').value;
    const tipo_trampa = document.getElementById('tipo_trampa').value;
    const machos_ceratitis = parseInt(document.getElementById('machos_ceratitis').value) || 0;
    const hembras_ceratitis = parseInt(document.getElementById('hembras_ceratitis').value) || 0;
    const machos_anastrepha = parseInt(document.getElementById('machos_anastrepha').value) || 0;
    const hembras_anastrepha = parseInt(document.getElementById('hembras_anastrepha').value) || 0;
    const observacion = document.getElementById('observacion').value;

    if (!fecha || !lugar || !tipo_trampa) {
      mostrarMensaje('⚠️ Completa fecha, lugar y tipo de trampa.', 'error');
      return;
    }

    const datos = {
      fecha, lugar, lote, tipo_trampa,
      machos_ceratitis, hembras_ceratitis,
      machos_anastrepha, hembras_anastrepha,
      coordenadas_lat: lat,
      coordenadas_lon: lon,
      observacion
    };

    if (navigator.onLine) {
      try {
        const res = await fetch(`${API}/registro`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datos)
        });
        if (res.ok) {
          const resultado = await res.json();
          mostrarMensaje(`✅ Trampa #${resultado.numero_trampa} guardada en ${lugar}`, 'exito');
          limpiarFormulario();
        } else {
          throw new Error('Error servidor');
        }
      } catch (err) {
        await guardarPendiente(datos);
        mostrarMensaje('⚠️ Error de red. Guardado localmente.', 'offline');
        mostrarPendientes();
        limpiarFormulario();
      }
    } else {
      await guardarPendiente(datos);
      mostrarMensaje('🟡 Sin internet. Guardado localmente, se sincronizará al conectarte.', 'offline');
      mostrarPendientes();
      limpiarFormulario();
    }
  }

  function mostrarMensaje(texto, tipo) {
    const div = document.getElementById('mensaje');
    div.textContent = texto;
    div.className = tipo;
    div.style.display = 'block';
    setTimeout(() => div.style.display = 'none', 5000);
  }

  function limpiarFormulario() {
    document.getElementById('lugar').value = '';
    document.getElementById('lote').value = '';
    document.getElementById('tipo_trampa').value = '';
    document.getElementById('machos_ceratitis').value = 0;
    document.getElementById('hembras_ceratitis').value = 0;
    document.getElementById('machos_anastrepha').value = 0;
    document.getElementById('hembras_anastrepha').value = 0;
    document.getElementById('observacion').value = '';
    document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
  }
</script>

</body>
</html>
